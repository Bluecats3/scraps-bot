workflows:
  ios-build:
    name: ScrapBot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluecats3.professorscraps

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Build signed archive
        script: |
          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=4K5NNL96PZ \
            archive \
            -archivePath build/App.xcarchive

    artifacts:
      - ios/App/build/App.xcarchive
