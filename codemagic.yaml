workflows:
  ios-build:
    name: ScrapBot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ScrapBotApp

    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluecats3.professorscraps

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Sync Capacitor
        script: |
          npx capacitor sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd ios/App

          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ../../exportOptions.plist \
            -exportPath build

    artifacts:
      - ios/App/build/*.ipa
