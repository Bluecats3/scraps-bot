workflows:
  ios-build:
    name: Professor Scraps iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Create Capacitor config if missing
        script: |
          if [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json <<EOF
          {
            "appId": "com.professorscraps.app",
            "appName": "Professor Scraps",
            "webDir": "www"
          }
          EOF
          fi

      - name: Add iOS platform fresh
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Show iOS files
        script: |
          find . -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Podfile"

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
