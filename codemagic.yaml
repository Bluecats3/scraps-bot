workflows:
  ios-build:
    name: Professor Scraps iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform if missing or broken
        script: |
          if [ ! -f "ios/App/App.xcworkspace" ]; then
            rm -rf ios
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Increase iOS build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build signed IPA
        script: |
          xcode-project use-profiles

          cd ios/App

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App

    artifacts:
      - ios/App/build/*.ipa
      - ios/App/build/**/*.xcarchive
