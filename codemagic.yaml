workflows:
  ios-build:
    name: Professor Scraps iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Build iOS project 
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
                                          
    artifacts:
      - ios/build/**/*.app
      - ios/build/**/*.ipa
