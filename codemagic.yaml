workflows:
  ios-build:
    name: ScrapBot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ScrapBotApp

    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluecats3.professorscraps

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Sync Capacitor
        script: |
          npx capacitor sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Create export options
        script: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>34774CV554</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bluecats3.professorscraps</key>
              <string>ProfessorScraps App Store Profile</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build iOS app
        script: |
          cd ios/App

          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            DEVELOPMENT_TEAM=34774CV554 \
            -archivePath build/App.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ../../exportOptions.plist \
            -exportPath build

    artifacts:
      - ios/App/build/*.ipa
