workflows:
  ios-build:
    name: Scrap Bot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Create Capacitor config if missing
        script: |
          if [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json <<EOF
          {
            "appId": "com.bluecats3.professorscraps",
            "appName": "Scrap Bot",
            "webDir": "www"
          }
          EOF
          fi

      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Show iOS files
        script: |
          find . -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "*.mobileprovision"

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project ios/App/App.xcodeproj

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM=34774CV554 PRODUCT_BUNDLE_IDENTIFIER=com.bluecats3.professorscraps PROVISIONING_PROFILE_SPECIFIER='ProfessorScraps App Store Profile'" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE
        notify:
          success: true
          failure: true
