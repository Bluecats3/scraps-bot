workflows:
  ios-build:
    name: Fact or Scrap iOS Build

    max_build_duration: 60

    instance_type: mac_mini_m2

    environment:
      node: 22

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluecats3.professorscraps

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    integrations:
      app_store_connect: Codemagic

    scripts:

      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/

          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Pod install
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      app_store_connect:
        auth: integration
