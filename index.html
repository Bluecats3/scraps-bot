<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fact or Scrap?">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fact or Scrap?</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="app-shell">

    <!-- MENU SCREEN -->
    <section id="modeScreen" class="screen">

      <h1>Scraps Bot</h1>

      <p class="subtitle">
        Pick a category to find the scrap!
      </p>

      <div class="robot-stage">
        <div class="antenna"></div>
        <div class="antenna-ball"></div>

        <div class="robot">
          <div class="visor">
            <div class="eye left-eye"></div>
            <div class="eye right-eye"></div>
          </div>

          <div class="cheek"></div>
          <div class="arm left-arm"></div>
          <div class="arm right-arm"></div>
        </div>
      </div>

      <div class="menu-buttons">

        <button onclick="startGame('science')">
          SCIENCE FACTS
        </button>

        <button onclick="startGame('history')">
          HISTORY FACTS
        </button>

        <button onclick="startGame('animals')">
          ANIMAL & NATURE FACTS
        </button>

        <button onclick="startGame('interesting')">
          WEIRD FACTS
        </button>

        <button onclick="openRules()">
          HOW TO PLAY
        </button>

      </div>

    </section>

    <!-- RULES SCREEN -->
    <section id="rulesScreen" class="screen hidden">

      <button class="topExitBtn" onclick="closeRules()">
        MAIN MENU
      </button>

      <h1 class="rulesTitle">
        SCRAPS BOT RULES
      </h1>

      <div class="rulesFacts">

  <div class="rulesFact">
    2 facts are REAL.
  </div>

  <div class="rulesFact">
    1 fact is SCRAP.
  </div>

  <div class="rulesFact">
    Tap the false fact to earn points!
  </div>

  <div class="rulesFact">
    Build streaks to become a Scrap Master.
  </div>

</div>

    </section>

    <!-- MULTIPLAYER SCREEN -->
   
    <!-- GAME SCREEN -->
    <section id="gameScreen" class="screen hidden">

      <h1>Fact or Scrap?</h1>

      <button class="topExitBtn" onclick="backToMenu(false)">
        MAIN MENU
      </button>

      <div class="scoreboard">

        <div class="scoreCard">
          <span>SCORE</span>
          <strong id="score">0</strong>
        </div>

        <div class="scoreCard">
          <span>STREAK</span>
          <strong id="streak">0</strong>
        </div>

        <div class="scoreCard">
          <span>ROUND</span>
          <strong id="roundNumber">1</strong>
        </div>

      </div>

      <div class="robot-stage small">
        <div class="antenna"></div>
        <div class="antenna-ball"></div>

        <div class="robot">
          <div class="visor">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>

          <div class="cheek"></div>
          <div class="arm left-arm"></div>
          <div class="arm right-arm"></div>
        </div>
      </div>

      <p id="scrapsText">
        Scraps bot is ready.
      </p>

      <div id="factButtons"></div>

      <div id="resultBox"></div>

      <div class="gameControls"></div>

    </section>



  </main>

  
  <script src="script.js"></script>

</body>

</html>
